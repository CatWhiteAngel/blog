# 死链巡检的行为配置:速率、重试、误报治理

# ---- 速率与超时:对目标站点温和,也降低被反爬误伤的概率 ----
max_concurrency = 8
timeout = 20
max_retries = 2        # 瞬时抖动给两次机会再判死
retry_wait_time = 2

# ---- 伪装成正常浏览器,减少对无头请求直接回 403 的站点误报 ----
user_agent = "Mozilla/5.0 (X11; Linux x86_64; rv:128.0) Gecko/20100101 Firefox/128.0"

# ---- 可接受的状态码 ----
# 429 = Too Many Requests:说明链接活着只是限流,不算死链
accept = ["100..=103", "200..=299", "429"]

# 只查 http/https,不查 mailto 等
scheme = ["https", "http"]

# ---- 排除名单(误报白名单)----
# 原则:只放"人工确认过活着、但对脚本访问必然报错"的域名,
# 不要图省事全局放行 403——真死链也常表现为 403
exclude = [
  "^https?://localhost",
  "^https?://127\\.",
  "^https?://192\\.168\\.",
  "^https?://10\\.",
  # 首次全量跑之后,把确认误报的域名逐个加到这里
]
